name: Build KernelSU Next for Pixel 4a 5G (GSI1)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl bc bison build-essential flex \
            libssl-dev libncurses5-dev lzop ccache

      - name: Read build config
        run: |
          CONFIG_ENV=config.properties
          echo "KERNEL_SOURCE=$(grep -w 'KERNEL_SOURCE' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$(grep -w 'KERNEL_SOURCE_BRANCH' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "KERNEL_CONFIG=$(grep -w 'KERNEL_CONFIG' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "ARCH=$(grep -w 'ARCH' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "THREAD=$(grep -w 'THREAD' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "KERNEL_IMAGE=$(grep -w 'KERNEL_IMAGE' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "ENABLE_KERNELSU=$(grep -w 'ENABLE_KERNELSU' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "KERNELSU_INSTALLER=$(grep -w 'KERNELSU_INSTALLER' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "KERNELSU_TAG=$(grep -w 'KERNELSU_TAG' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "BUILD_KERNELSU_BOOT_IMG=$(grep -w 'BUILD_KERNELSU_BOOT_IMG' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "KERNELSU_SOURCE_BOOT_IMAGE=$(grep -w 'KERNELSU_SOURCE_BOOT_IMAGE' $CONFIG_ENV | head -n1 | cut -d'=' -f2-)" >> $GITHUB_ENV

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b "$KERNEL_SOURCE_BRANCH" "$KERNEL_SOURCE" kernel
          cd kernel
          ls

      - name: Apply KernelSU Next
        if: env.ENABLE_KERNELSU == 'true'
        run: |
          cd kernel
          curl -LSs "$KERNELSU_INSTALLER" | bash -s "$KERNELSU_TAG"
          # 必要ならここで KernelSU Next 用の追加パッチを適用

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=$ARCH
          export SUBARCH=$ARCH
          export PATH="$PWD/clang/bin:$PATH"
          # 実際のツールチェーンに合わせて CROSS_COMPILE 等を設定
          make "$KERNEL_CONFIG"
          make -j"$THREAD"

      - name: Build boot image (GSI1)
        if: env.BUILD_KERNELSU_BOOT_IMG == 'true'
        run: |
          cd kernel
          mkdir -p out_img
          cp "$KERNEL_IMAGE" out_img/Image.gz
          # ここで GSI1 用 boot.img を再パック
          # 例: mkbootimg / AOSP の mkbootimg.py を利用
          # python mkbootimg.py --kernel out_img/Image.gz --ramdisk ramdisk-gsi1.img ... -o out_img/boot-gsi1-kernelsu.img

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bramble-kernelsu-next-gsi1
          path: |
            kernel/out_img/*
