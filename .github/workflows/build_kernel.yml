name: Build KernelSU Next for Pixel 4a 5G
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          # LineageOS 23.2 の Pixel 4a 5G (bramble) / 5 (redfin) 用カーネルソース
          kernel-url: https://github.com/LineageOS/android_kernel_google_redbull
          kernel-branch: lineage-23.2
          
          # defconfigの名前（gsi1用に指定のものがあればここを変更する）
          config: redbull_defconfig
          arch: arm64
          
          # コンパイラの設定
          # 4.19カーネルなのでAndroid 12環境などの古いClangが必要な場合がある
          aosp-gcc: true
          aosp-clang: true
          android-version: 12
          aosp-clang-version: r383902
          
          # KernelSU Next の組み込みを有効化
          ksu: true
          ksu-version: next
          
          # LTOが原因でビルドエラーになる場合はtrueにする
          disable-lto: false
          
          # AnyKernel3 形式のzipで出力する
          anykernel3: true
