name: Build KernelSU Next for Bramble

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev libncurses-dev git-core wget

      - name: Set up Toolchains
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain
          cd $GITHUB_WORKSPACE/toolchain
          
          # Clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz
          mkdir clang && tar -xf clang-r487747c.tar.gz -C clang
          
          # GCC 64
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz -O gcc64.tar.gz
          mkdir gcc64 && tar -xf gcc64.tar.gz -C gcc64
          
          # GCC 32
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/master.tar.gz -O gcc32.tar.gz
          mkdir gcc32 && tar -xf gcc32.tar.gz -C gcc32
          
          rm *.tar.gz

      - name: Fetch Kernel Source
        run: |
          # --single-branch と --no-tags を追加して極限まで軽量化
          git clone --depth=1 https://github.com/LineageOS/android_kernel_google_redbull.git -b lineage-21 --single-branch --no-tags kernel-src

      - name: Setup KernelSU Next
        run: |
          cd kernel-src
          # 指標となるソースがあるか確認してから実行
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/main/kernel/setup.sh" | bash -s main

      - name: Build Kernel
        run: |
          cd kernel-src
          
          TC_DIR=$GITHUB_WORKSPACE/toolchain
          export PATH=$TC_DIR/clang/bin:$TC_DIR/gcc64/bin:$TC_DIR/gcc32/bin:$PATH
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # 出力先を絶対パスで指定
          OUT_DIR=$GITHUB_WORKSPACE/out
          mkdir -p $OUT_DIR
          
          # Bramble用のDefconfig (LineageOS 21では b3_11_defconfig か vendor/redbull_defconfig)
          # エラー回避のため、ファイルが存在するか確認して実行
          if [ -f arch/arm64/configs/vendor/redbull_defconfig ]; then
            CONF=vendor/redbull_defconfig
          else
            CONF=b3_11_defconfig
          fi
          
          make O=$OUT_DIR $CONF
          
          make -j$(nproc) O=$OUT_DIR \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-Next-Bramble
          path: |
            out/arch/arm64/boot/Image.lz4
            out/arch/arm64/boot/dtbo.img
